services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apartment_search_web
    ports:
      - "8050:8050"
    volumes:
      - ./data:/app/data:ro
    restart: unless-stopped

  scraper:
    build:
      context: .
      dockerfile: scraper/Dockerfile
    init: true
    ipc: host
    volumes:
      - ./data:/app/data
      - ./cookies:/app/cookies
      - ./logs:/app/logs
      - ./scraper/.env:/app/.env:ro
    environment:
      - CRON_SCHEDULE=${CRON_SCHEDULE:-0 4 * * *} # Default: every day at 4 AM
    # For host cron job style we do not use restart or fixed container_name

