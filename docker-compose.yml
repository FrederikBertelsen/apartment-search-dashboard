services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apartment_search_web
    ports:
      - "8050:8050"
    volumes:
      - ./data:/app/data:ro
    restart: unless-stopped

  scraper:
    profiles:
      - scraper
    build:
      context: .
      dockerfile: scraper/Dockerfile
    init: true
    ipc: host
    volumes:
      - ./data:/app/data
      - ./cookies:/app/cookies
      - ./logs:/app/logs
      - ./scraper/.env:/app/.env:ro

